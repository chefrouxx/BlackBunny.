name: Build Desktop App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm ci
    - run: npm run dist
    - uses: actions/upload-artifact@v4
      with:
        name: BlackBunny-macOS
        path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm ci
    - run: npm run dist
    - uses: actions/upload-artifact@v4
      with:
        name: BlackBunny-Windows
        path: dist/*.exe
